<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiteatsy Home UI Replica (Reset)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", sans-serif;
      background: radial-gradient(1200px 700px at 50% 0%, #1e242d 0%, #0f1217 55%, #090b0f 100%);
      color: #fff;
    }
    .phone {
      width: min(390px, calc(100vw - 24px));
      aspect-ratio: 390/860;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(157.357deg, #262b2f 0.68074%, #16191d 74.027%);
      box-shadow: 0 50px 100px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .msg {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 20px;
      max-width: 300px;
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
    p { margin: 0; color: #aeb4be; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="msg">
      <div class="card">
        <h1>Reset Complete</h1>
        <p>All custom star/orb edits have been cleared. Ready to rebuild section by section from Figma.</p>
      </div>
    </div>
  </div>
</body>
</html>
